version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/pupoo_frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(frontend)"
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/pupoo_backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(backend)"
    groups:
      backend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/pupoo_ai"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ai"
    commit-message:
      prefix: "chore(ai)"
    groups:
      ai-python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/pupoo_backend"
    schedule:
      interval: "monthly"
      time: "05:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"
      - "docker"
    commit-message:
      prefix: "chore(backend-docker)"

  - package-ecosystem: "docker"
    directory: "/pupoo_ai"
    schedule:
      interval: "monthly"
      time: "05:45"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ai"
      - "docker"
    commit-message:
      prefix: "chore(ai-docker)"
