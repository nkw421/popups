# Scope note:
# - This workflow remains the shared CI pipeline for develop/main validation only.
# - Production deployment lives in .github/workflows/deploy.yml.
name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "scripts/check-import-case.mjs"
  push:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "scripts/check-import-case.mjs"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pupoo_frontend
        run: npm ci

      - name: Install lightningcss Linux binary
        if: runner.os == 'Linux'
        working-directory: pupoo_frontend
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Check frontend import casing
        run: node ./scripts/check-import-case.mjs

      - name: Build frontend
        working-directory: pupoo_frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: frontend
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pupoo_frontend
        run: npm ci

      - name: Install lightningcss Linux binary
        if: runner.os == 'Linux'
        working-directory: pupoo_frontend
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend
        working-directory: pupoo_backend
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test
