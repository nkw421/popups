# Scope note:
# - This workflow remains the shared CI pipeline for develop/main validation only.
# - Production deployment lives in .github/workflows/deploy.yml.
# - Frontend, backend, and AI validate independently so unrelated changes do not block each other.
name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/dependabot.yml"
      - "pupoo_ai/**"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "scripts/check-import-case.mjs"
      - "scripts/configure-aws-oidc.sh"
  push:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/dependabot.yml"
      - "pupoo_ai/**"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "scripts/check-import-case.mjs"
      - "scripts/configure-aws-oidc.sh"
  schedule:
    # Every Monday 03:00 KST / Sunday 18:00 UTC.
    - cron: "0 18 * * 0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
      workflow_guard: ${{ steps.filter.outputs.workflow_guard }}
      force_full_run: ${{ steps.mode.outputs.force_full_run }}

    steps:
      - name: Resolve execution mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "force_full_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            frontend:
              - ".github/workflows/ci.yml"
              - "pupoo_frontend/**"
              - "scripts/check-import-case.mjs"
            backend:
              - ".github/workflows/ci.yml"
              - "pupoo_backend/**"
            ai:
              - ".github/workflows/ci.yml"
              - "pupoo_ai/**"
            workflow_guard:
              - ".github/workflows/ci.yml"
              - ".github/workflows/deploy.yml"
              - ".github/dependabot.yml"
              - "scripts/configure-aws-oidc.sh"

  workflow-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.workflow_guard == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Validate workflow helper scripts
        run: |
          bash -n ./scripts/configure-aws-oidc.sh
          bash -n ./scripts/ensure-frontend-csp-report-only.sh
          ruby -e "require 'yaml'; YAML.load_file('.github/dependabot.yml')"

      - name: Block deprecated AWS credentials action
        run: |
          if git grep -n "^[[:space:]]*uses:[[:space:]]*aws-actions/configure-aws-credentials@" -- .github/workflows; then
            echo "::error::aws-actions/configure-aws-credentials is deprecated in this repository. Use ./scripts/configure-aws-oidc.sh instead."
            exit 1
          fi

  ai:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.ai == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install AI dependencies
        working-directory: pupoo_ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile AI sources
        working-directory: pupoo_ai
        run: python -m compileall app tests

      - name: Run AI unit tests
        working-directory: pupoo_ai
        run: PYTHONPATH=.. python -m unittest discover -s tests -p "test_*.py"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pupoo_frontend
        run: npm ci

      - name: Install lightningcss Linux binary
        if: runner.os == 'Linux'
        working-directory: pupoo_frontend
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Check frontend import casing
        run: node ./scripts/check-import-case.mjs

      - name: Build frontend
        working-directory: pupoo_frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.backend == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5.0.0

      - name: Build backend without frontend bundle
        working-directory: pupoo_backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test -PskipFrontendBuild=true
