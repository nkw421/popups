name: Deploy To EC2

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-ec2.yml"
      - ".github/workflows/ci.yml"
      - "deploy/ec2/**"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "pupoo_ai/**"
      - "scripts/check-import-case.mjs"
  workflow_dispatch:

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pupoo_frontend
        run: npm ci

      - name: Install lightningcss Linux binary
        if: runner.os == 'Linux'
        working-directory: pupoo_frontend
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Check frontend import casing
        run: node ./scripts/check-import-case.mjs

      - name: Build frontend
        working-directory: pupoo_frontend
        run: npm run build

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        working-directory: pupoo_backend
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test

      - name: Stage deploy bundle
        run: |
          mkdir -p deploy_bundle
          cp pupoo_backend/build/libs/pupoo-backend.jar deploy_bundle/app.jar
          cp deploy/ec2/pupoo.service.tpl deploy_bundle/pupoo.service.tpl
          cp deploy/ec2/pupoo-ai.service.tpl deploy_bundle/pupoo-ai.service.tpl
          cp -r pupoo_ai deploy_bundle/pupoo_ai
          cp pupoo_ai/requirements.txt deploy_bundle/requirements.txt

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: deploy_bundle/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    permissions:
      contents: read

    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: deploy_bundle

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "deploy_bundle/*"
          target: "/tmp/pupoo-deploy"
          strip_components: 1
          overwrite: true

      - name: Install bundle and restart services
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          APP_USER: ${{ secrets.EC2_APP_USER }}
          HEALTHCHECK_URL: ${{ vars.EC2_HEALTHCHECK_URL }}
          SERVICE_NAME: ${{ vars.EC2_SERVICE_NAME }}
          UPLOADS_DIR: ${{ secrets.EC2_UPLOADS_DIR }}
          AI_DIR: ${{ secrets.EC2_AI_DIR }}
          AI_ENV_FILE: ${{ secrets.AI_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 20m
          envs: APP_DIR,APP_ENV_FILE,APP_USER,HEALTHCHECK_URL,SERVICE_NAME,UPLOADS_DIR,AI_DIR,AI_ENV_FILE
          script: |
            set -euo pipefail

            SERVICE_NAME="${SERVICE_NAME:-pupoo}"
            APP_DIR="${APP_DIR:?APP_DIR is required}"
            APP_USER="${APP_USER:?APP_USER is required}"
            UPLOADS_DIR="${UPLOADS_DIR:?UPLOADS_DIR is required}"
            APP_ENV_FILE="${APP_ENV_FILE:?APP_ENV_FILE is required}"
            HEALTHCHECK_URL="${HEALTHCHECK_URL:-http://127.0.0.1:8080/api/health}"
            AI_DIR="${AI_DIR:-/opt/pupoo-ai}"
            AI_ENV_FILE="${AI_ENV_FILE:-}"

            # ── Spring Boot 배포 ──
            sudo install -d -o "$APP_USER" -g "$APP_USER" "$APP_DIR"
            sudo install -d -o "$APP_USER" -g "$APP_USER" "$UPLOADS_DIR"

            sudo install -o "$APP_USER" -g "$APP_USER" -m 0644 /tmp/pupoo-deploy/app.jar "$APP_DIR/app.jar"
            printf '%s\n' "$APP_ENV_FILE" | sudo tee "$APP_DIR/.env" > /dev/null
            sudo chown "$APP_USER:$APP_USER" "$APP_DIR/.env"
            sudo chmod 600 "$APP_DIR/.env"

            sed \
              -e "s|__APP_DIR__|$APP_DIR|g" \
              -e "s|__APP_USER__|$APP_USER|g" \
              /tmp/pupoo-deploy/pupoo.service.tpl | sudo tee "/etc/systemd/system/${SERVICE_NAME}.service" > /dev/null

            # ── AI 서버 배포 ──
            sudo install -d -o "$APP_USER" -g "$APP_USER" "$AI_DIR"
            sudo cp -r /tmp/pupoo-deploy/pupoo_ai "$AI_DIR/"
            sudo cp /tmp/pupoo-deploy/requirements.txt "$AI_DIR/"
            sudo chown -R "$APP_USER:$APP_USER" "$AI_DIR"

            # Python venv 생성 및 의존성 설치
            if [ ! -d "$AI_DIR/venv" ]; then
              sudo -u "$APP_USER" python3 -m venv "$AI_DIR/venv"
            fi
            sudo -u "$APP_USER" "$AI_DIR/venv/bin/pip" install --upgrade pip
            sudo -u "$APP_USER" "$AI_DIR/venv/bin/pip" install -r "$AI_DIR/requirements.txt"

            # AI .env 파일 설정
            if [ -n "$AI_ENV_FILE" ]; then
              printf '%s\n' "$AI_ENV_FILE" | sudo tee "$AI_DIR/.env" > /dev/null
              sudo chown "$APP_USER:$APP_USER" "$AI_DIR/.env"
              sudo chmod 600 "$AI_DIR/.env"
            fi

            sed \
              -e "s|__AI_DIR__|$AI_DIR|g" \
              -e "s|__APP_USER__|$APP_USER|g" \
              /tmp/pupoo-deploy/pupoo-ai.service.tpl | sudo tee "/etc/systemd/system/pupoo-ai.service" > /dev/null

            # ── 서비스 시작 ──
            sudo systemctl daemon-reload
            sudo systemctl enable pupoo-ai "$SERVICE_NAME"
            sudo systemctl restart pupoo-ai
            sudo systemctl restart "$SERVICE_NAME"

            # AI 서버 헬스체크
            for attempt in $(seq 1 10); do
              if curl -fsS "http://127.0.0.1:8000/internal/health" > /dev/null 2>&1; then
                echo "AI server is healthy"
                break
              fi
              if [ "$attempt" -eq 10 ]; then
                echo "WARNING: AI server health check failed (chatbot may not work)"
              fi
              sleep 3
            done

            # Spring Boot 헬스체크
            for attempt in $(seq 1 20); do
              if curl -fsS "$HEALTHCHECK_URL" > /dev/null; then
                exit 0
              fi
              sleep 3
            done

            sudo systemctl status "$SERVICE_NAME" --no-pager
            exit 1
