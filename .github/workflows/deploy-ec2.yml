name: Deploy To EC2

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-ec2.yml"
      - "deploy/ec2/**"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
  workflow_dispatch:

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        working-directory: pupoo_backend
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test

      - name: Stage deploy bundle
        run: |
          mkdir -p deploy_bundle
          cp pupoo_backend/build/libs/pupoo-backend.jar deploy_bundle/app.jar
          cp deploy/ec2/pupoo.service.tpl deploy_bundle/pupoo.service.tpl

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pupoo-backend-jar
          path: deploy_bundle/app.jar
          if-no-files-found: error

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "deploy_bundle/app.jar,deploy_bundle/pupoo.service.tpl"
          target: "/tmp/pupoo-deploy"
          strip_components: 1
          overwrite: true

      - name: Install bundle and restart service
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          APP_USER: ${{ secrets.EC2_APP_USER }}
          SERVICE_NAME: ${{ vars.EC2_SERVICE_NAME }}
          UPLOADS_DIR: ${{ secrets.EC2_UPLOADS_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 20m
          envs: APP_DIR,APP_ENV_FILE,APP_USER,SERVICE_NAME,UPLOADS_DIR
          script: |
            set -euo pipefail

            SERVICE_NAME="${SERVICE_NAME:-pupoo}"
            APP_DIR="${APP_DIR:?APP_DIR is required}"
            APP_USER="${APP_USER:?APP_USER is required}"
            UPLOADS_DIR="${UPLOADS_DIR:?UPLOADS_DIR is required}"
            APP_ENV_FILE="${APP_ENV_FILE:?APP_ENV_FILE is required}"

            sudo install -d -o "$APP_USER" -g "$APP_USER" "$APP_DIR"
            sudo install -d -o "$APP_USER" -g "$APP_USER" "$UPLOADS_DIR"

            sudo install -o "$APP_USER" -g "$APP_USER" -m 0644 /tmp/pupoo-deploy/app.jar "$APP_DIR/app.jar"
            printf '%s\n' "$APP_ENV_FILE" | sudo tee "$APP_DIR/.env" > /dev/null
            sudo chown "$APP_USER:$APP_USER" "$APP_DIR/.env"
            sudo chmod 600 "$APP_DIR/.env"

            sed \
              -e "s|__APP_DIR__|$APP_DIR|g" \
              -e "s|__APP_USER__|$APP_USER|g" \
              /tmp/pupoo-deploy/pupoo.service.tpl | sudo tee "/etc/systemd/system/${SERVICE_NAME}.service" > /dev/null

            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE_NAME"
            sudo systemctl restart "$SERVICE_NAME"

            for attempt in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8080/api/health > /dev/null; then
                exit 0
              fi
              sleep 3
            done

            sudo systemctl status "$SERVICE_NAME" --no-pager
            exit 1
