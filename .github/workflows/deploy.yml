# Scope note:
# - This workflow deploys the production stack from the main branch.
# - Frontend ships to S3/CloudFront, while backend and AI ship to EKS via ECR images.
# - Runtime secrets stay outside git and must already exist in the target cluster.
name: Deploy Main

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "k8s/**"
      - "pupoo_ai/**"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "scripts/check-import-case.mjs"
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.pupoo.site' }}
      VITE_AI_BASE_URL: ${{ vars.VITE_AI_BASE_URL || '/ai' }}
      VITE_CDN_BASE_URL: ${{ vars.VITE_CDN_BASE_URL || 'https://cdn.pupoo.site' }}
      VITE_ASSET_BASE_URL: ${{ vars.VITE_ASSET_BASE_URL || 'https://cdn.pupoo.site' }}
      VITE_KAKAO_REST_KEY: ${{ vars.VITE_KAKAO_REST_KEY }}
      VITE_KAKAO_REDIRECT_URI: ${{ vars.VITE_KAKAO_REDIRECT_URI }}
      VITE_KAKAO_MAP_KEY: ${{ vars.VITE_KAKAO_MAP_KEY || 'b338ac0a2a4b79c4fdffe57afe4591c4' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pupoo_frontend
        run: npm ci

      - name: Install lightningcss Linux binary
        if: runner.os == 'Linux'
        working-directory: pupoo_frontend
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Check frontend import casing
        run: node ./scripts/check-import-case.mjs

      - name: Build frontend
        working-directory: pupoo_frontend
        run: npm run build

      - name: Configure AWS credentials for frontend deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync frontend assets to S3
        run: aws s3 sync pupoo_frontend/dist/ "s3://${{ vars.FRONTEND_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.FRONTEND_CF_DISTRIBUTION_ID }}" --paths "/*"

  eks-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: frontend-deploy
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      EKS_NAMESPACE: ${{ vars.EKS_NAMESPACE }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'dall-e-3' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend
        working-directory: pupoo_backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Configure AWS credentials for EKS deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./pupoo_backend
          file: ./pupoo_backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.BACKEND_ECR_REPOSITORY }}:latest

      - name: Build and push AI image
        uses: docker/build-push-action@v6
        with:
          context: ./pupoo_ai
          file: ./pupoo_ai/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.AI_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.AI_ECR_REPOSITORY }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Sync backend runtime secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_AI_MODERATION_INTERNAL_TOKEN: ${{ secrets.APP_AI_MODERATION_INTERNAL_TOKEN }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is required"
            exit 1
          fi
          CURRENT_AI_SERVICE_INTERNAL_TOKEN="$(kubectl -n "${EKS_NAMESPACE:-pupoo}" get secret pupoo-backend-secret -o jsonpath='{.data.AI_SERVICE_INTERNAL_TOKEN}' | base64 -d)"
          MODERATION_INTERNAL_TOKEN="${APP_AI_MODERATION_INTERNAL_TOKEN:-${CURRENT_AI_SERVICE_INTERNAL_TOKEN}}"

          if [ -z "${MODERATION_INTERNAL_TOKEN}" ]; then
            echo "APP_AI_MODERATION_INTERNAL_TOKEN is missing and existing AI_SERVICE_INTERNAL_TOKEN could not be read"
            exit 1
          fi

          kubectl -n "${EKS_NAMESPACE:-pupoo}" patch secret pupoo-backend-secret --type merge -p "$(cat <<EOF
          {
            \"stringData\": {
              \"OPENAI_API_KEY\": \"${OPENAI_API_KEY}\",
              \"OPENAI_IMAGE_MODEL\": \"${OPENAI_IMAGE_MODEL}\",
              \"APP_AI_MODERATION_INTERNAL_TOKEN\": \"${MODERATION_INTERNAL_TOKEN}\"
            }
          }
          EOF
          )"

      - name: Apply base manifests
        run: kubectl apply -k k8s/base

      - name: Update backend and AI images
        run: |
          kubectl -n "${EKS_NAMESPACE:-pupoo}" set image deployment/pupoo-backend \
            backend="${{ steps.ecr.outputs.registry }}/${{ vars.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}"
          kubectl -n "${EKS_NAMESPACE:-pupoo}" set image deployment/pupoo-ai \
            ai="${{ steps.ecr.outputs.registry }}/${{ vars.AI_ECR_REPOSITORY }}:${{ github.sha }}"

      - name: Wait for backend rollout
        run: kubectl -n "${EKS_NAMESPACE:-pupoo}" rollout status deployment/pupoo-backend --timeout=5m

      - name: Wait for AI rollout
        run: kubectl -n "${EKS_NAMESPACE:-pupoo}" rollout status deployment/pupoo-ai --timeout=5m
