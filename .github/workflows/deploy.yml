# Scope note:
# - This workflow deploys the production stack from the main branch.
# - Frontend ships to S3/CloudFront, while backend and AI ship to EKS via ECR images.
# - Runtime secrets stay outside git and must already exist in the target cluster.
name: Deploy Main

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "k8s/**"
      - "pupoo_ai/**"
      - "pupoo_backend/**"
      - "pupoo_frontend/**"
      - "scripts/check-import-case.mjs"
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.pupoo.site' }}
      VITE_AI_BASE_URL: ${{ vars.VITE_AI_BASE_URL || '/ai' }}
      VITE_CDN_BASE_URL: ${{ vars.VITE_CDN_BASE_URL || 'https://cdn.pupoo.site' }}
      VITE_ASSET_BASE_URL: ${{ vars.VITE_ASSET_BASE_URL || 'https://cdn.pupoo.site' }}
      VITE_KAKAO_REST_KEY: ${{ vars.VITE_KAKAO_REST_KEY }}
      VITE_KAKAO_REDIRECT_URI: ${{ vars.VITE_KAKAO_REDIRECT_URI }}
      VITE_KAKAO_MAP_KEY: ${{ vars.VITE_KAKAO_MAP_KEY || 'b338ac0a2a4b79c4fdffe57afe4591c4' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pupoo_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: pupoo_frontend
        run: npm ci

      - name: Install lightningcss Linux binary
        if: runner.os == 'Linux'
        working-directory: pupoo_frontend
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Check frontend import casing
        run: node ./scripts/check-import-case.mjs

      - name: Build frontend
        working-directory: pupoo_frontend
        run: npm run build

      - name: Configure AWS credentials for frontend deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync frontend assets to S3
        run: aws s3 sync pupoo_frontend/dist/ "s3://${{ vars.FRONTEND_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.FRONTEND_CF_DISTRIBUTION_ID }}" --paths "/*"

  eks-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: frontend-deploy
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      EKS_NAMESPACE: ${{ vars.EKS_NAMESPACE }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'dall-e-3' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend
        working-directory: pupoo_backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Configure AWS credentials for EKS deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Load datasource env for AI training
        run: |
          NS="${EKS_NAMESPACE:-pupoo}"
          DS_URL="$(kubectl -n "$NS" get secret pupoo-backend-secret -o jsonpath='{.data.SPRING_DATASOURCE_URL}' | base64 -d)"
          DS_USER="$(kubectl -n "$NS" get secret pupoo-backend-secret -o jsonpath='{.data.SPRING_DATASOURCE_USERNAME}' | base64 -d)"
          DS_PASSWORD="$(kubectl -n "$NS" get secret pupoo-backend-secret -o jsonpath='{.data.SPRING_DATASOURCE_PASSWORD}' | base64 -d)"

          if [ -z "${DS_URL}" ] || [ -z "${DS_USER}" ] || [ -z "${DS_PASSWORD}" ]; then
            echo "SPRING_DATASOURCE_* is missing in pupoo-backend-secret"
            exit 1
          fi

          {
            echo "PUPOO_AI_TRAIN_DB_URL=${DS_URL}"
            echo "PUPOO_AI_TRAIN_DB_USER=${DS_USER}"
            echo "PUPOO_AI_TRAIN_DB_PASSWORD=${DS_PASSWORD}"
          } >> "$GITHUB_ENV"

      - name: Set up Python 3.12 for AI training
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AI training dependencies
        working-directory: pupoo_ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train congestion models
        working-directory: pupoo_ai
        run: |
          python -m app.features.congestion.train.train_congestion_models \
            --validation-ratio 0.2 \
            --min-rows 200 \
            --output-dir ./artifacts/congestion

      - name: Verify trained model artifacts
        working-directory: pupoo_ai
        run: |
          ls -al ./artifacts/congestion
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          output_dir = Path("./artifacts/congestion")
          report_path = output_dir / "training_report_latest.json"

          if not report_path.exists():
              print("::error::training_report_latest.json is missing")
              sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          targets = report.get("targets", {})

          def verify_target(target_name: str, required: bool) -> bool:
              target = targets.get(target_name, {})
              status = target.get("status") or ("trained" if target.get("trained") else "skipped")
              reason = target.get("reason", "")
              artifacts = target.get("artifacts") or [
                  f"{target_name.lower()}_congestion_model.joblib",
                  f"{target_name.lower()}_lstm_baseline.joblib",
              ]

              print(f"[verify] {target_name}: status={status}")
              if reason:
                  print(f"[verify] {target_name}: reason={reason}")

              if status != "trained":
                  if required:
                      print(f"::error::{target_name} target was not trained. reason={reason or 'unknown'}")
                      return False
                  print(f"::warning::{target_name} target skipped. reason={reason or 'unknown'}")
                  return True

              missing = [name for name in artifacts if not (output_dir / name).exists()]
              if missing:
                  level = "error" if required else "warning"
                  print(f"::{level}::{target_name} trained but missing artifacts: {', '.join(missing)}")
                  return not required

              print(f"[verify] {target_name}: artifacts OK -> {', '.join(artifacts)}")
              return True

          event_ok = verify_target("EVENT", required=True)
          program_ok = verify_target("PROGRAM", required=False)

          if not event_ok:
              sys.exit(1)

          if not program_ok:
              print("::warning::PROGRAM artifacts are incomplete, but deployment continues because EVENT artifacts are available.")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./pupoo_backend
          file: ./pupoo_backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.BACKEND_ECR_REPOSITORY }}:latest

      - name: Build and push AI image
        uses: docker/build-push-action@v6
        with:
          context: ./pupoo_ai
          file: ./pupoo_ai/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.AI_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.AI_ECR_REPOSITORY }}:latest

      - name: Sync backend runtime secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_AI_MODERATION_INTERNAL_TOKEN: ${{ secrets.APP_AI_MODERATION_INTERNAL_TOKEN }}
          AWS_AUTH_MESSAGING_ACCESS_KEY_ID: ${{ secrets.AWS_AUTH_MESSAGING_ACCESS_KEY_ID }}
          AWS_AUTH_MESSAGING_SECRET_ACCESS_KEY: ${{ secrets.AWS_AUTH_MESSAGING_SECRET_ACCESS_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          AUTH_AWS_REGION: ${{ vars.AUTH_AWS_REGION }}
          AUTH_SMS_REGION: ${{ vars.AUTH_SMS_REGION }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is required"
            exit 1
          fi
          if [ -z "${AWS_AUTH_MESSAGING_ACCESS_KEY_ID}" ] || [ -z "${AWS_AUTH_MESSAGING_SECRET_ACCESS_KEY}" ]; then
            echo "AWS auth messaging secrets are required"
            exit 1
          fi
          if [ -z "${SES_FROM_EMAIL}" ]; then
            echo "SES_FROM_EMAIL secret is required"
            exit 1
          fi
          CURRENT_AI_SERVICE_INTERNAL_TOKEN="$(kubectl -n "${EKS_NAMESPACE:-pupoo}" get secret pupoo-backend-secret -o jsonpath='{.data.AI_SERVICE_INTERNAL_TOKEN}' | base64 -d)"
          MODERATION_INTERNAL_TOKEN="${APP_AI_MODERATION_INTERNAL_TOKEN:-${CURRENT_AI_SERVICE_INTERNAL_TOKEN}}"
          EMAIL_PROVIDER="$(kubectl -n "${EKS_NAMESPACE:-pupoo}" get secret pupoo-backend-secret -o jsonpath='{.data.AUTH_EMAIL_PROVIDER}' | base64 -d 2>/dev/null || true)"
          SMS_PROVIDER="$(kubectl -n "${EKS_NAMESPACE:-pupoo}" get secret pupoo-backend-secret -o jsonpath='{.data.AUTH_SMS_PROVIDER}' | base64 -d 2>/dev/null || true)"
          SMS_ORIGINATION_NUMBER="$(kubectl -n "${EKS_NAMESPACE:-pupoo}" get secret pupoo-backend-secret -o jsonpath='{.data.AWS_SMS_ORIGINATION_NUMBER}' | base64 -d 2>/dev/null || true)"
          SMS_SENDER_ID="$(kubectl -n "${EKS_NAMESPACE:-pupoo}" get secret pupoo-backend-secret -o jsonpath='{.data.AWS_SMS_SENDER_ID}' | base64 -d 2>/dev/null || true)"

          if [ -z "${MODERATION_INTERNAL_TOKEN}" ]; then
            echo "APP_AI_MODERATION_INTERNAL_TOKEN is missing and existing AI_SERVICE_INTERNAL_TOKEN could not be read"
            exit 1
          fi

          if [ -z "${EMAIL_PROVIDER}" ]; then
            EMAIL_PROVIDER="aws-ses"
          fi
          if [ -z "${SMS_PROVIDER}" ]; then
            SMS_PROVIDER="aws-sns"
          fi

          cat > /tmp/pupoo-backend-secret-patch.yaml <<EOF
          stringData:
            OPENAI_API_KEY: "${OPENAI_API_KEY}"
            OPENAI_IMAGE_MODEL: "${OPENAI_IMAGE_MODEL}"
            APP_AI_MODERATION_INTERNAL_TOKEN: "${MODERATION_INTERNAL_TOKEN}"
            AUTH_EMAIL_PROVIDER: "${EMAIL_PROVIDER}"
            AUTH_SMS_PROVIDER: "${SMS_PROVIDER}"
            AWS_REGION: "${AUTH_AWS_REGION}"
            AWS_SMS_REGION: "${AUTH_SMS_REGION}"
            AWS_ACCESS_KEY_ID: "${AWS_AUTH_MESSAGING_ACCESS_KEY_ID}"
            AWS_SECRET_ACCESS_KEY: "${AWS_AUTH_MESSAGING_SECRET_ACCESS_KEY}"
            AWS_SES_FROM_ADDRESS: "${SES_FROM_EMAIL}"
            AWS_SMS_ORIGINATION_NUMBER: "${SMS_ORIGINATION_NUMBER}"
            AWS_SMS_SENDER_ID: "${SMS_SENDER_ID}"
          EOF

          kubectl -n "${EKS_NAMESPACE:-pupoo}" patch secret pupoo-backend-secret \
            --type merge \
            --patch-file /tmp/pupoo-backend-secret-patch.yaml

      - name: Apply base manifests
        run: kubectl apply -k k8s/base

      - name: Update backend and AI images
        run: |
          kubectl -n "${EKS_NAMESPACE:-pupoo}" set image deployment/pupoo-backend \
            backend="${{ steps.ecr.outputs.registry }}/${{ vars.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}"
          kubectl -n "${EKS_NAMESPACE:-pupoo}" set image deployment/pupoo-ai \
            ai="${{ steps.ecr.outputs.registry }}/${{ vars.AI_ECR_REPOSITORY }}:${{ github.sha }}"

      - name: Wait for backend rollout
        run: kubectl -n "${EKS_NAMESPACE:-pupoo}" rollout status deployment/pupoo-backend --timeout=5m

      - name: Wait for AI rollout
        run: kubectl -n "${EKS_NAMESPACE:-pupoo}" rollout status deployment/pupoo-ai --timeout=5m
