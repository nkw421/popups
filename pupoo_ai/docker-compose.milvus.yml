# Milvus: embedded etcd/minio 대신 공식 standalone 스택(etcd + minio + milvus).
# embedded 모드에서 로그에 "localhost:9000 connection refused" + datacoord/querycoord 없음이 나오면
# 스토리지(MinIO)가 안 뜬 것 → pymilvus code=2. 이 구성은 MinIO를 별 컨테이너로 띄워 해소.
# pupoo_ai는 호스트 19530만 쓰면 됨. MinIO/etcd는 Docker 네트워크 내부 전용(호스트 9000 충돌 방지).

services:
  etcd:
    container_name: pupoo-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  minio:
    container_name: pupoo-milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  milvus:
    container_name: pupoo-milvus
    image: milvusdb/milvus:v2.4.6
    restart: unless-stopped
    shm_size: "2gb"
    mem_limit: 4g
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MILVUS_LOG_LEVEL: info
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

volumes:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:

networks:
  default:
    name: pupoo-milvus-net
