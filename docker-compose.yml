version: "3.9"

services:
  mysql:
    image: mysql:8.0.44
    container_name: pupoo-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: pupoodb
      MYSQL_USER: pupoo
      MYSQL_PASSWORD: pupoo1234!
      MYSQL_ROOT_PASSWORD: root1234!
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./pupoo_backend/src/main/resources/data/pupoo_db_v5_final.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./pupoo_backend/src/main/resources/data/pupoo_seed_v5_final.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mysql_data:
