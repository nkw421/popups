# Production object storage
spring.config.import=optional:file:./application-prod-secrets.properties

# Production auth delivery defaults
auth.email.provider=${AUTH_EMAIL_PROVIDER:aws-ses}
auth.sms.provider=${AUTH_SMS_PROVIDER:aws-sns}
aws.region=${AWS_REGION:ap-northeast-2}
aws.sms.region=${AWS_SMS_REGION:${AWS_REGION:us-east-1}}
aws.ses.from-address=${AWS_SES_FROM_ADDRESS:no-reply@pupoo.site}
aws.ses.from-name=${AWS_SES_FROM_NAME:POPUPS}
aws.sms.origination-number=${AWS_SMS_ORIGINATION_NUMBER:}
aws.sms.sender-id=${AWS_SMS_SENDER_ID:}
verification.email.base-url=${VERIFICATION_EMAIL_BASE_URL:https://api.pupoo.site}

app.storage.mode=${APP_STORAGE_MODE:${STORAGE_MODE:s3}}
app.storage.key-prefix=${APP_STORAGE_KEY_PREFIX:${STORAGE_KEY_PREFIX:${STORAGE_S3_KEY_PREFIX:uploads}}}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:}
app.storage.cdn-base-url=${APP_STORAGE_CDN_BASE_URL:https://cdn.pupoo.site}
app.storage.bucket=${APP_STORAGE_BUCKET:${STORAGE_BUCKET:${STORAGE_S3_BUCKET:pupoo-uploads}}}
app.storage.region=${APP_STORAGE_REGION:${STORAGE_REGION:${STORAGE_S3_REGION:${AWS_REGION:ap-northeast-2}}}}
app.storage.access-key-id=${APP_STORAGE_ACCESS_KEY_ID:${STORAGE_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}}
app.storage.secret-access-key=${APP_STORAGE_SECRET_ACCESS_KEY:${STORAGE_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}}
app.storage.session-token=${APP_STORAGE_SESSION_TOKEN:${STORAGE_SESSION_TOKEN:${AWS_SESSION_TOKEN:}}}

storage.type=${app.storage.mode}
storage.mode=${app.storage.mode}
storage.key-prefix=${app.storage.key-prefix}
storage.public-base-url=${app.storage.public-base-url}
storage.cdn-base-url=${app.storage.cdn-base-url}
storage.bucket=${app.storage.bucket}
storage.region=${app.storage.region}
storage.access-key-id=${app.storage.access-key-id}
storage.secret-access-key=${app.storage.secret-access-key}
storage.session-token=${app.storage.session-token}

# Credentials can come from:
# 1) application-prod-secrets.properties
# 2) AWS SDK default provider chain (recommended on AWS infra)
