# Production object storage
spring.config.import=optional:file:./application-prod-secrets.properties

# Production auth delivery defaults
auth.email.provider=${AUTH_EMAIL_PROVIDER:aws-ses}
auth.sms.provider=${AUTH_SMS_PROVIDER:aws-sns}
aws.region=${AWS_REGION:ap-northeast-2}
aws.access-key-id=${AWS_AUTH_MESSAGING_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_AUTH_MESSAGING_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_AUTH_MESSAGING_SESSION_TOKEN:}
aws.sms.region=${AWS_SMS_REGION:${AWS_REGION:ap-northeast-1}}
aws.ses.from-address=${AWS_SES_FROM_ADDRESS:}
aws.ses.from-name=${AWS_SES_FROM_NAME:}
aws.sms.origination-number=${AWS_SMS_ORIGINATION_NUMBER:}
aws.sms.sender-id=${AWS_SMS_SENDER_ID:}
verification.email.base-url=${VERIFICATION_EMAIL_BASE_URL:}
verification.dev.expose=${VERIFICATION_DEV_EXPOSE:false}

app.storage.mode=${APP_STORAGE_MODE:${STORAGE_MODE:s3}}
app.storage.base-path=${APP_STORAGE_BASE_PATH:${STORAGE_BASE_PATH:./uploads}}
app.storage.public-prefix=${APP_STORAGE_PUBLIC_PREFIX:${STORAGE_PUBLIC_PREFIX:/uploads}}
app.storage.key-prefix=${APP_STORAGE_KEY_PREFIX:${STORAGE_KEY_PREFIX:${STORAGE_S3_KEY_PREFIX:uploads}}}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:}
app.storage.cdn-base-url=${APP_STORAGE_CDN_BASE_URL:}
app.storage.bucket=${APP_STORAGE_BUCKET:${STORAGE_BUCKET:${STORAGE_S3_BUCKET:pupoo-uploads}}}
app.storage.region=${APP_STORAGE_REGION:${STORAGE_REGION:${STORAGE_S3_REGION:${AWS_REGION:ap-northeast-2}}}}
app.storage.access-key-id=${APP_STORAGE_ACCESS_KEY_ID:${STORAGE_ACCESS_KEY_ID:}}
app.storage.secret-access-key=${APP_STORAGE_SECRET_ACCESS_KEY:${STORAGE_SECRET_ACCESS_KEY:}}
app.storage.session-token=${APP_STORAGE_SESSION_TOKEN:${STORAGE_SESSION_TOKEN:}}
