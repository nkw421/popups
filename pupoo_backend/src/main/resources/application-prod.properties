# Production object storage
spring.config.import=optional:file:./application-prod-secrets.properties

storage.mode=${STORAGE_MODE:S3}
storage.s3.bucket=${STORAGE_S3_BUCKET:pupoo-storage}
storage.s3.region=${STORAGE_S3_REGION:${AWS_REGION:ap-northeast-2}}
storage.s3.key-prefix=${STORAGE_S3_KEY_PREFIX:uploads}
storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:}

# Credentials can come from:
# 1) application-prod-secrets.properties
# 2) AWS SDK default provider chain (recommended on AWS infra)
