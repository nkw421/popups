app.ai.moderation.internal-token=${APP_AI_MODERATION_INTERNAL_TOKEN:dev-internal-token}
app.ai.moderation.timeout-seconds=${APP_AI_MODERATION_TIMEOUT_SECONDS:10}
app.ai.moderation.enabled=${APP_AI_MODERATION_ENABLED:true}
