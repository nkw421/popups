# Storage SSOT: storage settings are managed via app.storage.* first.
app.storage.mode=${APP_STORAGE_MODE:${STORAGE_MODE:local}}
app.storage.base-path=${APP_STORAGE_BASE_PATH:${STORAGE_BASE_PATH:./uploads}}
app.storage.public-prefix=${APP_STORAGE_PUBLIC_PREFIX:${STORAGE_PUBLIC_PREFIX:/uploads}}
app.storage.key-prefix=${APP_STORAGE_KEY_PREFIX:${STORAGE_KEY_PREFIX:${STORAGE_S3_KEY_PREFIX:uploads}}}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
app.storage.cdn-base-url=${APP_STORAGE_CDN_BASE_URL:https://cdn.pupoo.site}
app.storage.bucket=${APP_STORAGE_BUCKET:${STORAGE_BUCKET:${STORAGE_S3_BUCKET:${AWS_S3_BUCKET:pupoo-uploads}}}}
app.storage.region=${APP_STORAGE_REGION:${STORAGE_REGION:${STORAGE_S3_REGION:${AWS_REGION:ap-northeast-2}}}}
app.storage.access-key-id=${APP_STORAGE_ACCESS_KEY_ID:${STORAGE_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}}
app.storage.secret-access-key=${APP_STORAGE_SECRET_ACCESS_KEY:${STORAGE_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}}
app.storage.session-token=${APP_STORAGE_SESSION_TOKEN:${STORAGE_SESSION_TOKEN:${AWS_SESSION_TOKEN:}}}
# IBM COS / MinIO ļō▒ S3 ĒśĖĒÖś API (ļ╣äņÜ░ļ®┤ AWS ĻĖ░ļ│Ė ņŚöļō£ĒÅ¼ņØĖĒŖĖ)
app.storage.service-endpoint=${APP_STORAGE_SERVICE_ENDPOINT:${STORAGE_SERVICE_ENDPOINT:}}
