# =========================
# Datasource
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pupoodb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pupoo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# HikariCP
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.schema-locations=${SPRING_SQL_INIT_SCHEMA_LOCATIONS:optional:classpath:db/password_reset_token.sql}

# =========================
# Logging
# =========================
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:info}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_HIBERNATE_BIND:info}

# =========================
# Server
# =========================
server.port=${SERVER_PORT:8080}
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.forward-headers-strategy=framework

# =========================
# Actuator / Health
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =========================
# CORS
# =========================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://3.38.233.224,http://3.38.233.224:80,https://pupoo.site,https://www.pupoo.site,https://api.pupoo.site,https://cdn.pupoo.site}

# =========================
# JWT
# =========================
auth.jwt.secret=${AUTH_JWT_SECRET:}
auth.jwt.issuer=${AUTH_JWT_ISSUER:pupoo}
auth.jwt.previous-secrets=${AUTH_JWT_PREVIOUS_SECRETS:}

# TTL (seconds)
auth.access.ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:3600}
auth.refresh.ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:1209600}

# Refresh cookie
auth.refresh.cookie.max-age-seconds=${AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS:1209600}
auth.refresh.cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:true}
auth.refresh.cookie.http-only=${AUTH_REFRESH_COOKIE_HTTP_ONLY:true}
auth.refresh.cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
auth.refresh.cookie.path=${AUTH_REFRESH_COOKIE_PATH:/api/auth}

# Verification
verification.hash.salt=${VERIFICATION_HASH_SALT:}
verification.hash.previous-salts=${VERIFICATION_HASH_PREVIOUS_SALTS:}
verification.password-reset.ttl-minutes=${VERIFICATION_PASSWORD_RESET_TTL_MINUTES:30}
verification.email.base-url=${VERIFICATION_EMAIL_BASE_URL:}
verification.dev.expose=${VERIFICATION_DEV_EXPOSE:false}
auth.email.provider=${AUTH_EMAIL_PROVIDER:dev}
auth.sms.provider=${AUTH_SMS_PROVIDER:dev}
auth.sms.enabled=${AUTH_SMS_ENABLED:true}
auth.sms.otp-expiry-seconds=${AUTH_SMS_OTP_EXPIRY_SECONDS:300}
auth.sms.resend-cooldown-seconds=${AUTH_SMS_RESEND_COOLDOWN_SECONDS:60}
auth.sms.max-requests-per-minute=${AUTH_SMS_MAX_REQUESTS_PER_MINUTE:1}
auth.sms.max-requests-per-day=${AUTH_SMS_MAX_REQUESTS_PER_DAY:5}
auth.sms.max-verify-failures=${AUTH_SMS_MAX_VERIFY_FAILURES:5}

# =========================
# AWS Messaging
# =========================
aws.region=${AWS_REGION:ap-northeast-2}
aws.sms.region=${AWS_SMS_REGION:${AWS_REGION:ap-northeast-2}}
aws.ses.from-address=${AWS_SES_FROM_ADDRESS:}
aws.ses.from-name=${AWS_SES_FROM_NAME:}
aws.sms.origination-number=${AWS_SMS_ORIGINATION_NUMBER:}
aws.sms.sender-id=${AWS_SMS_SENDER_ID:}

# =========================
# Redis
# =========================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}

# =========================
# Kakao OAuth
# =========================
kakao.oauth.client-id=${KAKAO_OAUTH_CLIENT_ID:}
kakao.oauth.redirect-uri=${KAKAO_OAUTH_REDIRECT_URI:http://localhost:8080/auth/kakao/callback}
kakao.oauth.client-secret=${KAKAO_OAUTH_CLIENT_SECRET:}
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:5173/auth/google/callback}

# =========================
# Naver OAuth
# =========================
naver.oauth.client-id=${NAVER_OAUTH_CLIENT_ID:}
naver.oauth.client-secret=${NAVER_OAUTH_CLIENT_SECRET:}
naver.oauth.redirect-uri=${NAVER_OAUTH_REDIRECT_URI:http://localhost:5173/naver/callback}

# =========================
# KakaoPay
# =========================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
kakaopay.base-url=${KAKAOPAY_BASE_URL:https://open-api.kakaopay.com}
kakaopay.secret-key=${KAKAOPAY_SECRET_KEY:}
kakaopay.authorization-prefix=${KAKAOPAY_AUTH_PREFIX:SECRET_KEY }
kakaopay.cid=${KAKAOPAY_CID:TC0ONETIME}
kakaopay.ready-path=${KAKAOPAY_READY_PATH:/online/v1/payment/ready}
kakaopay.approve-path=${KAKAOPAY_APPROVE_PATH:/online/v1/payment/approve}
kakaopay.cancel-path=${KAKAOPAY_CANCEL_PATH:/online/v1/payment/cancel}
kakaopay.approval-url=${KAKAOPAY_APPROVAL_URL:${app.frontend.base-url}/payment/approve?paymentId={paymentId}}
kakaopay.cancel-url=${KAKAOPAY_CANCEL_URL:${app.frontend.base-url}/payment/cancel?paymentId={paymentId}}
kakaopay.fail-url=${KAKAOPAY_FAIL_URL:${app.frontend.base-url}/payment/fail?paymentId={paymentId}}

# =========================
# AI Service
# =========================
ai.service.base-url=${AI_SERVICE_BASE_URL:http://ai:8000}
ai.service.internal-token=${AI_SERVICE_INTERNAL_TOKEN:}
ai.service.connect-timeout-ms=${AI_SERVICE_CONNECT_TIMEOUT_MS:2000}
ai.service.response-timeout-ms=${AI_SERVICE_RESPONSE_TIMEOUT_MS:3000}
# Poster generation goes through pupoo_ai `/internal/poster/generate`,
# so it needs a longer timeout than congestion predictions.
ai.service.poster-response-timeout-ms=${AI_SERVICE_POSTER_RESPONSE_TIMEOUT_MS:60000}
ai.service.max-in-memory-size-bytes=${AI_SERVICE_MAX_IN_MEMORY_SIZE_BYTES:5242880}
ai.scheduler.enabled=${AI_SCHEDULER_ENABLED:true}
ai.scheduler.fixed-delay-ms=${AI_SCHEDULER_FIXED_DELAY_MS:300000}
ai.scheduler.initial-delay-ms=${AI_SCHEDULER_INITIAL_DELAY_MS:30000}
ai.aggregation.scheduler.cron=${AI_AGGREGATION_SCHEDULER_CRON:0 */5 * * * *}
ai.aggregation.scheduler.zone=${AI_AGGREGATION_SCHEDULER_ZONE:Asia/Seoul}
ai.wait.sync.scheduler.enabled=${AI_WAIT_SYNC_SCHEDULER_ENABLED:true}
ai.wait.sync.scheduler.fixed-delay-ms=${AI_WAIT_SYNC_SCHEDULER_FIXED_DELAY_MS:15000}
ai.wait.sync.scheduler.initial-delay-ms=${AI_WAIT_SYNC_SCHEDULER_INITIAL_DELAY_MS:5000}
ai.wait.sync.lookback-minutes=${AI_WAIT_SYNC_LOOKBACK_MINUTES:15}
ai.wait.sync.applied-weight=${AI_WAIT_SYNC_APPLIED_WEIGHT:0.35}
ai.wait.sync.stay-lookback-hours=${AI_WAIT_SYNC_STAY_LOOKBACK_HOURS:24}
ai.wait.sync.stay-sample-size=${AI_WAIT_SYNC_STAY_SAMPLE_SIZE:40}
ai.wait.sync.default-stay-minutes=${AI_WAIT_SYNC_DEFAULT_STAY_MINUTES:12}

# =========================
# AI Moderation
# =========================
# 로컬: AI 서비스(FastAPI)가 localhost:8000, 토큰은 pupoo_ai 기본(PUPOO_AI_INTERNAL_TOKEN)과 동일하게 맞춘다.
# K8s 등 배포 환경에서는 AI_MODERATION_BASE_URL / AI_MODERATION_INTERNAL_TOKEN 으로 덮어쓴다.
ai.moderation.enabled=${AI_MODERATION_ENABLED:true}
ai.moderation.base-url=${AI_MODERATION_BASE_URL:http://pupoo-ai:80}
ai.moderation.internal-token=${AI_MODERATION_INTERNAL_TOKEN:}
# 정책 TXT+DB키워드+watsonx 임베딩+Milvus 는 120초를 넘길 수 있음 — 필요 시 AI_MODERATION_TIMEOUT_SECONDS 로 조정
ai.moderation.connect-timeout-ms=${AI_MODERATION_CONNECT_TIMEOUT_MS:3000}
ai.moderation.read-timeout-ms=${AI_MODERATION_READ_TIMEOUT_MS:8000}

# =========================
# IBM Orchestrate / 외부 오케스트레이션 웹훅 (정책 업로드 연동)
# =========================
# OFF | NOTIFY_AFTER_SUCCESS (동기 AI 반영 성공 후 비동기 알림) | DISPATCH_ONLY (객체 스토리지 저장 후 웹훅만 호출, pupoo_ai 직접 호출 안 함)
ai.orchestrate.enabled=${AI_ORCHESTRATE_ENABLED:false}
ai.orchestrate.mode=${AI_ORCHESTRATE_MODE:OFF}
# 절대 URL 권장. 비우면 base-url + trigger-path 조합 사용
ai.orchestrate.webhook-url=${AI_ORCHESTRATE_WEBHOOK_URL:}
ai.orchestrate.base-url=${AI_ORCHESTRATE_BASE_URL:}
ai.orchestrate.trigger-path=${AI_ORCHESTRATE_TRIGGER_PATH:/}
ai.orchestrate.bearer-token=${AI_ORCHESTRATE_BEARER_TOKEN:}
ai.orchestrate.extra-header-name=${AI_ORCHESTRATE_EXTRA_HEADER_NAME:}
ai.orchestrate.extra-header-value=${AI_ORCHESTRATE_EXTRA_HEADER_VALUE:}
ai.orchestrate.timeout-seconds=${AI_ORCHESTRATE_TIMEOUT_SECONDS:60}

# =========================
# File Upload
# =========================
# Storage SSOT: storage settings are managed via app.storage.* first.
app.storage.mode=${APP_STORAGE_MODE:${STORAGE_MODE:local}}
app.storage.base-path=${APP_STORAGE_BASE_PATH:${STORAGE_BASE_PATH:./uploads}}
app.storage.public-prefix=${APP_STORAGE_PUBLIC_PREFIX:${STORAGE_PUBLIC_PREFIX:/uploads}}
app.storage.key-prefix=${APP_STORAGE_KEY_PREFIX:${STORAGE_KEY_PREFIX:${STORAGE_S3_KEY_PREFIX:uploads}}}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
app.storage.cdn-base-url=${APP_STORAGE_CDN_BASE_URL:https://cdn.pupoo.site}
app.storage.bucket=${APP_STORAGE_BUCKET:${STORAGE_BUCKET:${STORAGE_S3_BUCKET:${AWS_S3_BUCKET:pupoo-uploads}}}}
app.storage.region=${APP_STORAGE_REGION:${STORAGE_REGION:${STORAGE_S3_REGION:${AWS_REGION:ap-northeast-2}}}}
app.storage.access-key-id=${APP_STORAGE_ACCESS_KEY_ID:${STORAGE_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}}
app.storage.secret-access-key=${APP_STORAGE_SECRET_ACCESS_KEY:${STORAGE_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}}
app.storage.session-token=${APP_STORAGE_SESSION_TOKEN:${STORAGE_SESSION_TOKEN:${AWS_SESSION_TOKEN:}}}
# IBM COS / MinIO 등 S3 호환 API (비우면 AWS 기본 엔드포인트)
app.storage.service-endpoint=${APP_STORAGE_SERVICE_ENDPOINT:${STORAGE_SERVICE_ENDPOINT:}}
app.storage.path-style-access=${APP_STORAGE_PATH_STYLE_ACCESS:${STORAGE_PATH_STYLE_ACCESS:false}}

# Legacy compatibility: keep storage.* aliases for existing references.
storage.type=${app.storage.mode}
storage.mode=${app.storage.mode}
storage.base-path=${app.storage.base-path}
storage.public-prefix=${app.storage.public-prefix}
storage.key-prefix=${app.storage.key-prefix}
storage.public-base-url=${app.storage.public-base-url}
storage.cdn-base-url=${app.storage.cdn-base-url}
storage.bucket=${app.storage.bucket}
storage.region=${app.storage.region}
storage.access-key-id=${app.storage.access-key-id}
storage.secret-access-key=${app.storage.secret-access-key}
storage.session-token=${app.storage.session-token}
storage.service-endpoint=${app.storage.service-endpoint}
storage.path-style-access=${app.storage.path-style-access}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
