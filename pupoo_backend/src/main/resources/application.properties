# =========================
# File Upload
# =========================
storage.mode=${STORAGE_MODE:LOCAL}
storage.base-path=${STORAGE_BASE_PATH:./uploads}
storage.public-prefix=${STORAGE_PUBLIC_PREFIX:/uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =========================
# Storage / Public URL
# =========================
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}

# =========================
# AWS S3
# =========================
aws.s3.bucket=${AWS_S3_BUCKET:pupoo-storage}
aws.region=${AWS_REGION:ap-northeast-2}

# =========================
# AI Moderation (pupoo_ai FastAPI)
# =========================
