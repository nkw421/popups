# file: src/main/resources/application.properties

# =========================
# Datasource
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pupoodb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pupoo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pupoo1234!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# =========================
# Logging
# =========================
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:debug}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_HIBERNATE_BIND:trace}

# =========================
# Server
# =========================
server.port=${SERVER_PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# =========================
# JWT
# =========================
auth.jwt.secret=${AUTH_JWT_SECRET:UtwCG3OB1og3S3kaB1UlM/yJR5UWuaNEuv3i6jWwQyw=}
auth.jwt.issuer=${AUTH_JWT_ISSUER:pupoo}

# TTL (seconds)
auth.access.ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:3600}
auth.refresh.ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:1209600}

# Refresh cookie
auth.refresh.cookie.max-age-seconds=${AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS:1209600}
auth.refresh.cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:false}
auth.refresh.cookie.http-only=${AUTH_REFRESH_COOKIE_HTTP_ONLY:true}
auth.refresh.cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
auth.refresh.cookie.path=${AUTH_REFRESH_COOKIE_PATH:/api/auth}

# Verification
verification.hash.salt=${VERIFICATION_HASH_SALT:dev-local-salt-please-change-1234}

# Kakao OAuth
kakao.oauth.client-id=${KAKAO_OAUTH_CLIENT_ID:}
kakao.oauth.redirect-uri=${KAKAO_OAUTH_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}
kakao.oauth.client-secret=${KAKAO_OAUTH_CLIENT_SECRET:}

# =========================
# KakaoPay
# =========================
kakaopay.base-url=${KAKAOPAY_BASE_URL:https://open-api.kakaopay.com}
kakaopay.secret-key=${KAKAOPAY_SECRET_KEY:}
kakaopay.authorization-prefix=${KAKAOPAY_AUTH_PREFIX:SECRET_KEY }
kakaopay.cid=${KAKAOPAY_CID:TC0ONETIME}
kakaopay.ready-path=${KAKAOPAY_READY_PATH:/online/v1/payment/ready}
kakaopay.approve-path=${KAKAOPAY_APPROVE_PATH:/online/v1/payment/approve}
kakaopay.cancel-path=${KAKAOPAY_CANCEL_PATH:/online/v1/payment/cancel}
kakaopay.approval-url=${KAKAOPAY_APPROVAL_URL:http://localhost:5173/payment/approve?paymentId={paymentId}}
kakaopay.cancel-url=${KAKAOPAY_CANCEL_URL:http://localhost:5173/payment/cancel?paymentId={paymentId}}
kakaopay.fail-url=${KAKAOPAY_FAIL_URL:http://localhost:5173/payment/fail?paymentId={paymentId}}
