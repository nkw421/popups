apiVersion: apps/v1
kind: Deployment
metadata:
  name: pupoo-backend
  namespace: pupoo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pupoo-backend
  template:
    metadata:
      labels:
        app: pupoo-backend
    spec:
      containers:
        - name: backend
          image: 593797021262.dkr.ecr.ap-northeast-2.amazonaws.com/pupoo-backend:20260313-cdn-cloudfront
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8080"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://pupoodb.c50c2i048hc8.ap-northeast-2.rds.amazonaws.com:3306/pupoodb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "pupoo"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "pupoo1234!"

            - name: SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE
              value: "10"
            - name: SPRING_DATASOURCE_HIKARI_MIN_IDLE
              value: "2"
            - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
              value: "30000"
            - name: SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT
              value: "5000"

            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "validate"
            - name: SPRING_JPA_SHOW_SQL
              value: "true"
            - name: SPRING_SQL_INIT_MODE
              value: "never"

            - name: LOGGING_LEVEL_HIBERNATE_SQL
              value: "debug"
            - name: LOGGING_LEVEL_HIBERNATE_BIND
              value: "trace"

            - name: APP_CORS_ALLOWED_ORIGIN_PATTERNS
              value: "http://localhost:5173,http://3.38.233.224,http://3.38.233.224:80,http://pupoo.duckdns.org,https://pupoo.duckdns.org,http://*.duckdns.org,https://*.duckdns.org,https://pupoo.site,https://www.pupoo.site"

            - name: AUTH_JWT_SECRET
              value: "UtwCG3OB1og3S3kaB1UlM/yJR5UWuaNEuv3i6jWwQyw="
            - name: AUTH_JWT_ISSUER
              value: "pupoo"

            - name: AUTH_ACCESS_TTL_SECONDS
              value: "3600"
            - name: AUTH_REFRESH_TTL_SECONDS
              value: "1209600"
            - name: AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS
              value: "1209600"
            - name: AUTH_REFRESH_COOKIE_SECURE
              value: "false"
            - name: AUTH_REFRESH_COOKIE_HTTP_ONLY
              value: "true"
            - name: AUTH_REFRESH_COOKIE_SAME_SITE
              value: "Lax"
            - name: AUTH_REFRESH_COOKIE_PATH
              value: "/api/auth"

            - name: VERIFICATION_HASH_SALT
              value: "dev-local-salt-please-change-1234"
            - name: VERIFICATION_PASSWORD_RESET_TTL_MINUTES
              value: "30"

            - name: KAKAO_OAUTH_CLIENT_ID
              value: "c976535bf32f53f09dac8b0702c64b1e"
            - name: KAKAO_OAUTH_REDIRECT_URI
              value: "https://www.pupoo.site/auth/kakao/callback"
            - name: KAKAO_OAUTH_CLIENT_SECRET
              value: "LWhBRJpF3J5OLo4MTREtODOxeC3Kvalf"

            - name: KAKAOPAY_BASE_URL
              value: "https://open-api.kakaopay.com"
            - name: KAKAOPAY_SECRET_KEY
              value: "DEV26DA93095D56DC1689B8DAE029CD2B389BEDB"
            - name: KAKAOPAY_AUTH_PREFIX
              value: "SECRET_KEY "
            - name: KAKAOPAY_CID
              value: "TC0ONETIME"
            - name: KAKAOPAY_READY_PATH
              value: "/online/v1/payment/ready"
            - name: KAKAOPAY_APPROVE_PATH
              value: "/online/v1/payment/approve"
            - name: KAKAOPAY_CANCEL_PATH
              value: "/online/v1/payment/cancel"
            - name: KAKAOPAY_APPROVAL_URL
              value: "http://pupoo.duckdns.org/payment/approve?paymentId={paymentId}"
            - name: KAKAOPAY_CANCEL_URL
              value: "http://pupoo.duckdns.org/payment/cancel?paymentId={paymentId}"
            - name: KAKAOPAY_FAIL_URL
              value: "http://pupoo.duckdns.org/payment/fail?paymentId={paymentId}"

            - name: AI_SERVICE_BASE_URL
              value: "http://pupoo-ai.pupoo.svc.cluster.local"
            - name: AI_SERVICE_INTERNAL_TOKEN
              value: "dev-internal-token"
            - name: AI_SERVICE_CONNECT_TIMEOUT_MS
              value: "500"
            - name: AI_SERVICE_RESPONSE_TIMEOUT_MS
              value: "3000"
            - name: AI_SERVICE_MAX_IN_MEMORY_SIZE_BYTES
              value: "5242880"
            - name: AI_SCHEDULER_ENABLED
              value: "true"
            - name: AI_SCHEDULER_FIXED_DELAY_MS
              value: "300000"
            - name: AI_SCHEDULER_INITIAL_DELAY_MS
              value: "30000"
            - name: AI_AGGREGATION_SCHEDULER_CRON
              value: "0 */5 * * * *"
            - name: AI_AGGREGATION_SCHEDULER_ZONE
              value: "Asia/Seoul"

            - name: AI_MODERATION_ENABLED
              value: "true"
            - name: AI_MODERATION_BASE_URL
              value: "http://pupoo-ai.pupoo.svc.cluster.local"
            - name: AI_MODERATION_INTERNAL_TOKEN
              value: "dev-internal-token"

            - name: APP_STORAGE_MODE
              value: "s3"
            - name: APP_STORAGE_KEY_PREFIX
              value: "uploads"
            - name: APP_STORAGE_PUBLIC_BASE_URL
              value: "https://pupoo-storage.s3.ap-northeast-2.amazonaws.com"
            - name: APP_STORAGE_CDN_BASE_URL
              value: "https://cdn.pupoo.site
            - name: APP_STORAGE_BUCKET
              value: "pupoo-uploads"
            - name: APP_STORAGE_REGION
              value: "ap-northeast-2"

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
