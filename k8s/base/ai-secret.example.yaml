# 사용법: 복사 후 값을 채워 `pupoo-ai-secret` 으로 적용한다.
#   cp k8s/base/ai-secret.example.yaml k8s/base/ai-secret.local.yaml
#   # 편집 후 (로컬 파일은 git 에 올리지 말 것)
#   kubectl apply -f k8s/base/ai-secret.local.yaml
#
# backend 의 AI_SERVICE_INTERNAL_TOKEN 과 반드시 동일하게 맞출 것.
apiVersion: v1
kind: Secret
metadata:
  name: pupoo-ai-secret
  namespace: pupoo
type: Opaque
stringData:
  PUPOO_AI_INTERNAL_TOKEN: "REPLACE_ME_SAME_AS_BACKEND_AI_SERVICE_INTERNAL_TOKEN"
  PUPOO_AI_WATSONX_API_KEY: "REPLACE_ME"
  PUPOO_AI_WATSONX_PROJECT_ID: "REPLACE_ME"
  # RDS (policy 키워드 병합용)
  # - PUPOO_AI_DB_HOST/PORT/USER/NAME 는 ai-configmap.yaml의 값을 사용합니다.
  PUPOO_AI_DB_PASSWORD: "REPLACE_ME"
  # 선택: 챗봇 등 OpenAI 경로를 쓰는 경우
  OPENAI_API_KEY: ""
  # Milvus 인증 사용 시
  PUPOO_AI_MILVUS_USERNAME: ""
  PUPOO_AI_MILVUS_PASSWORD: ""
