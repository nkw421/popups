apiVersion: apps/v1
kind: Deployment
metadata:
  name: pupoo-backend
  namespace: pupoo
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: pupoo-backend
  template:
    metadata:
      labels:
        app: pupoo-backend
    spec:
      serviceAccountName: pupoo-backend
      containers:
        - name: backend
          image: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/pupoo/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: pupoo-backend-config
            - secretRef:
                name: pupoo-backend-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
