apiVersion: v1
kind: Secret
metadata:
  name: pupoo-backend-secret
  namespace: pupoo
type: Opaque
stringData:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:mysql://REPLACE_ME:3306/pupoodb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
  SPRING_DATASOURCE_USERNAME: "REPLACE_ME"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME"
  AUTH_JWT_SECRET: "REPLACE_ME"
  VERIFICATION_HASH_SALT: "REPLACE_ME"
  AI_SERVICE_INTERNAL_TOKEN: "REPLACE_ME"
  # Spring property: ai.moderation.internal-token=${AI_MODERATION_INTERNAL_TOKEN:...}
  AI_MODERATION_INTERNAL_TOKEN: "REPLACE_ME_SAME_AS_PUPOO_AI_INTERNAL_TOKEN"
  # Backward-compat: (기존에 넣어두신 키) 남겨둬도 무방하지만, Spring은 AI_MODERATION_* 키를 우선으로 읽습니다.
  APP_AI_MODERATION_INTERNAL_TOKEN: "REPLACE_ME_SAME_AS_PUPOO_AI_INTERNAL_TOKEN"
  OPENAI_IMAGE_BASE_URL: "https://api.openai.com"
  OPENAI_API_KEY: "REPLACE_ME"
  AUTH_EMAIL_PROVIDER: "aws-ses"
  AUTH_SMS_PROVIDER: "dev"
  AWS_REGION: "ap-northeast-2"
  AWS_SMS_REGION: "us-east-1"
  AWS_AUTH_MESSAGING_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_AUTH_MESSAGING_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_SES_FROM_ADDRESS: "no-reply@pupoo.site"
  AWS_SES_FROM_NAME: "POPUPS"
  VERIFICATION_EMAIL_BASE_URL: "https://api.pupoo.site"
  VERIFICATION_DEV_EXPOSE: "false"
  AWS_SMS_ORIGINATION_NUMBER: ""
  AWS_SMS_SENDER_ID: ""
  KAKAO_OAUTH_CLIENT_ID: "REPLACE_ME"
  KAKAO_OAUTH_CLIENT_SECRET: "REPLACE_ME"
  KAKAO_OAUTH_REDIRECT_URI: "https://www.pupoo.site/auth/kakao/callback"
  NAVER_OAUTH_CLIENT_ID: "REPLACE_ME"
  NAVER_OAUTH_CLIENT_SECRET: "REPLACE_ME"
  NAVER_OAUTH_REDIRECT_URI: "https://www.pupoo.site/naver/callback"
  KAKAOPAY_SECRET_KEY: "REPLACE_ME"
