apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pupoo-ai
  namespace: pupoo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pupoo-ai
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
