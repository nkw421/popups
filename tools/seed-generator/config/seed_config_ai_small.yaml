project: pupoo
schema_path: ../../db/pupoo_schema_v6.6.sql
mode_default: all

output_path_operational: ./output/pupoo_seed_small_for_ai.sql
output_path_ai: ../../db/pupoo_ai_seed_v6.6_small.sql

users:
  count: 1200

pets:
  max_per_user: 2
  ownership_ratio: 0.55

events:
  total_count: 10
  status_distribution:
    ENDED: 4
    ONGOING: 4
    PLANNED: 2

booths:
  min_per_event: 12

programs:
  session_min_per_day: 1
  contest_min_per_day: 1
  experience_min_per_day: 3

qr:
  enabled: true
  volume_scale: 1.2

community:
  enabled: false

payments:
  enabled: false

ai:
  interval_minutes: 5
  scale_mode: tiny
  training_window_minutes: 60
  prediction_enabled: true
  event_timeseries_enabled: true
  program_timeseries_enabled: true
  event_operation_hours:
    start_hour: 9
    end_hour: 18
  program_operation_hours:
    start_hour: 9
    end_hour: 18
  target_rows:
    tiny:
      ai_event_congestion_timeseries: { min: 1000, max: 3000, target: 1800 }
      ai_program_congestion_timeseries: { min: 1000, max: 3000, target: 2600 }
      ai_training_dataset: { min: 600, max: 2500, target: 1400 }
      ai_prediction_logs: { min: 200, max: 1500, target: 800 }
